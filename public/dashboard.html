<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART Orchestrator Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎭</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        
        .control-panel {
            background: #16213e;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        .control-panel h2 {
            margin-bottom: 20px;
            color: #667eea;
            font-size: 20px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            margin-bottom: 8px;
            font-weight: 500;
            color: #a0a0a0;
            font-size: 14px;
        }
        
        .form-group input {
            padding: 12px 16px;
            background: #0f3460;
            border: 2px solid #1a1a2e;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .status-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: #0f3460;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.idle {
            background: #10b981;
        }
        
        .status-indicator.running {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }
        
        .status-indicator.error {
            background: #ef4444;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        
        @media (max-width: 1024px) {
            .panels {
                grid-template-columns: 1fr;
            }
        }
        
        .panel {
            background: #16213e;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        
        .panel h3 {
            margin-bottom: 15px;
            color: #667eea;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .log-container {
            height: 500px;
            overflow-y: auto;
            background: #0a0e27;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .log-entry {
            margin-bottom: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid;
        }
        
        .log-entry.info {
            background: rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
        }
        
        .log-entry.warn {
            background: rgba(245, 158, 11, 0.1);
            border-left-color: #f59e0b;
        }
        
        .log-entry.error {
            background: rgba(239, 68, 68, 0.1);
            border-left-color: #ef4444;
        }
        
        .log-entry .timestamp {
            color: #6b7280;
            font-size: 12px;
        }
        
        .log-entry .level {
            font-weight: bold;
            margin-right: 8px;
        }
        
        .log-entry.info .level { color: #3b82f6; }
        .log-entry.warn .level { color: #f59e0b; }
        .log-entry.error .level { color: #ef4444; }
        
        .log-entry .message {
            color: #e5e7eb;
        }
        
        .report-viewer {
            height: 500px;
            overflow-y: auto;
            background: #0a0e27;
            border-radius: 8px;
            padding: 15px;
        }
        
        .report-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-card.success .number { color: #10b981; }
        .stat-card.failed .number { color: #ef4444; }
        .stat-card.pending .number { color: #f59e0b; }
        
        .stat-card .label {
            font-size: 14px;
            color: #9ca3af;
        }
        
        .orders-list {
            margin-top: 20px;
        }
        
        .order-item {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid;
        }
        
        .order-item.completed { border-left-color: #10b981; }
        .order-item.failed { border-left-color: #ef4444; }
        .order-item.running { border-left-color: #f59e0b; }
        .order-item.pending { border-left-color: #6b7280; }
        .order-item.stopped { border-left-color: #8b5cf6; }
        .order-item.timeout { border-left-color: #f97316; }
        .order-error { margin-top: 6px; font-size: 12px; color: #ef4444; font-family: monospace; word-break: break-word; }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .order-id {
            font-weight: 600;
            color: #fff;
        }
        
        .order-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .order-status.completed { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .order-status.failed { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .order-status.running { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .order-status.stopped { background: rgba(139, 92, 246, 0.2); color: #8b5cf6; }
        .order-status.timeout { background: rgba(249, 115, 22, 0.2); color: #f97316; }
        .order-status.pending { background: rgba(107, 114, 128, 0.2); color: #9ca3af; }
        
        .order-details {
            font-size: 13px;
            color: #9ca3af;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .clear-logs-btn {
            float: right;
            padding: 8px 16px;
            background: #4b5563;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-top: -5px;
        }
        
        .clear-logs-btn:hover {
            background: #6b7280;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎭 ART Orchestrator Dashboard</h1>
    </div>
    
    <div class="container">
        <div class="control-panel">
            <h2>⚙️ Control Panel</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="merchantId">Merchant ID</label>
                    <input type="text" id="merchantId" placeholder="e.g., flipkart" value="flipkart">
                </div>
                <div class="form-group">
                    <label for="orderList">Order IDs (comma-separated)</label>
                    <input type="text" id="orderList" placeholder="e.g., ORD123,ORD456,ORD789">
                </div>
                <div class="form-group">
                    <label for="lastMinutes">Process Last N Minutes</label>
                    <input type="number" id="lastMinutes" placeholder="e.g., 60" min="1">
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <button class="btn btn-primary" id="startBtn" onclick="startART()">
                    ▶️ Start ART
                </button>
                <button class="btn btn-danger" id="stopBtn" onclick="stopART()" disabled>
                    ⏹️ Stop ART
                </button>
            </div>
        </div>
        
        <div class="status-bar">
            <div class="status-indicator idle" id="statusIndicator"></div>
            <span id="statusText">Idle - Ready to start</span>
        </div>
        
        <div class="panels">
            <div class="panel">
                <h3>
                    📋 Live Logs
                    <button class="clear-logs-btn" onclick="clearLogs()">Clear</button>
                </h3>
                <div class="log-container" id="logContainer">
                    <div class="log-entry info">
                        <span class="timestamp">--:--:--</span>
                        <span class="level">[INFO]</span>
                        <span class="message">Dashboard initialized. Ready to start ART.</span>
                    </div>
                </div>
            </div>
            
            <div class="panel">
                <h3>📊 Execution Report</h3>
                <div class="report-viewer" id="reportViewer">
                    <p style="text-align: center; color: #6b7280; margin-top: 100px;">
                        No report available yet.<br>
                        Start ART to see execution results.
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let eventSource = null;
        let isRunning = false;
        
        function updateStatus(status, text) {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            
            indicator.className = 'status-indicator ' + status;
            statusText.textContent = text;
            
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            
            if (status === 'running') {
                startBtn.disabled = true;
                stopBtn.disabled = false;
                isRunning = true;
            } else {
                startBtn.disabled = false;
                stopBtn.disabled = true;
                isRunning = false;
            }
        }
        
        function addLog(level, message, timestamp = new Date()) {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${level.toLowerCase()}`;
            
            const timeStr = timestamp.toLocaleTimeString();
            entry.innerHTML = `
                <span class="timestamp">${timeStr}</span>
                <span class="level">[${level.toUpperCase()}]</span>
                <span class="message">${message}</span>
            `;
            
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }
        
        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '';
        }
        
        async function startART() {
            const merchantId = document.getElementById('merchantId').value.trim();
            const orderList = document.getElementById('orderList').value.trim();
            const lastMinutes = document.getElementById('lastMinutes').value;

            if (!merchantId) {
                alert('Please enter a Merchant ID');
                return;
            }

            if (!orderList && !lastMinutes) {
                alert('Please enter Order IDs or specify Last Minutes');
                return;
            }

            updateStatus('running', 'Starting ART...');
            clearLogs();
            addLog('info', 'Starting ART process...');

            // Reset report viewer and clear the report file before starting
            resetReportViewer();
            await fetch('/api/reset-report', { method: 'POST' }).catch(() => {});

            try {
                const response = await fetch('/api/start-art', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        merchantId,
                        orderList: orderList ? orderList.split(',').map(s => s.trim()) : [],
                        lastMinutes: lastMinutes ? parseInt(lastMinutes) : null
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                addLog('info', `ART started: ${data.message}`);

                connectEventSource();

            } catch (error) {
                addLog('error', `Failed to start ART: ${error.message}`);
                updateStatus('idle', 'Failed to start');
            }
        }

        async function stopART() {
            try {
                const response = await fetch('/api/stop-art', { method: 'POST' });
                const data = await response.json();
                addLog('info', `ART stopped: ${data.message}`);
                // Keep SSE open — backend will send reportUpdate when report is written
                updateStatus('idle', 'Stopping...');
            } catch (error) {
                addLog('error', `Failed to stop ART: ${error.message}`);
            }
        }

        function resetReportViewer() {
            document.getElementById('reportViewer').innerHTML = `
                <p style="text-align: center; color: #6b7280; margin-top: 100px;">
                    ART is running...<br>
                    Report will appear here when complete.
                </p>
            `;
        }

        function connectEventSource() {
            if (eventSource) {
                eventSource.close();
            }

            eventSource = new EventSource('/api/stream-logs');

            eventSource.onopen = () => {
                addLog('info', 'Connected to log stream');
            };

            eventSource.onmessage = (event) => {
                const log = JSON.parse(event.data);
                addLog(log.level, log.message, new Date(log.timestamp));

                if (log.reportUpdate) {
                    loadReport();
                    // ART is fully done — close SSE and mark idle
                    if (eventSource) {
                        eventSource.close();
                        eventSource = null;
                    }
                    updateStatus('idle', 'Completed');
                }
            };

            eventSource.onerror = () => {
                addLog('warn', 'Log stream disconnected');
                if (isRunning) {
                    updateStatus('idle', 'Disconnected');
                }
            };
        }
        
        async function loadReport() {
            try {
                const response = await fetch('/api/report');
                if (!response.ok) return;
                
                const report = await response.json();
                renderReport(report);
                
            } catch (error) {
                console.error('Failed to load report:', error);
            }
        }
        
        function renderReport(report) {
            const container = document.getElementById('reportViewer');
            
            if (!report || !report.orders || report.orders.length === 0) {
                container.innerHTML = `
                    <p style="text-align: center; color: #6b7280; margin-top: 100px;">
                        No report available yet.<br>
                        Start ART to see execution results.
                    </p>
                `;
                return;
            }
            
            const summary = report.summary || {};
            const total = summary.totalOrders || 0;
            const completed = summary.completed || 0;
            const failed = summary.failed || 0;
            const stuck = summary.stuck || 0;
            const stopped = summary.stopped || 0;
            const timeout = summary.timeout || 0;
            const pending = total - completed - failed - stuck - stopped - timeout;
            
            let ordersHtml = '';
            for (const order of report.orders) {
                const status = order.status?.toLowerCase() || 'pending';
                const errorLine = order.errorMessage
                    ? `<div class="order-error">⚠ ${order.errorMessage}</div>`
                    : '';
                ordersHtml += `
                    <div class="order-item ${status}">
                        <div class="order-header">
                            <span class="order-id">${order.orderId}</span>
                            <span class="order-status ${status}">${order.status || 'PENDING'}</span>
                        </div>
                        <div class="order-details">
                            ${order.stopReason || 'Waiting...'}
                            ${order.logsProcessed ? `| Logs: ${order.logsProcessed}` : ''}
                            ${order.duration ? `| Duration: ${Math.round(order.duration/1000)}s` : ''}
                        </div>
                        ${errorLine}
                    </div>
                `;
            }
            
            container.innerHTML = `
                <div class="report-summary">
                    <div class="stat-card success">
                        <div class="number">${completed}</div>
                        <div class="label">Completed</div>
                    </div>
                    <div class="stat-card failed">
                        <div class="number">${failed}</div>
                        <div class="label">Failed</div>
                    </div>
                    <div class="stat-card pending">
                        <div class="number">${stuck}</div>
                        <div class="label">Stuck</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${pending}</div>
                        <div class="label">Pending</div>
                    </div>
                </div>
                <div class="orders-list">
                    ${ordersHtml}
                </div>
            `;
        }
        
    </script>
</body>
</html>
