<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART Orchestrator Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎭</text></svg>">
    <style>
        /* ── Palette ──────────────────────────────────────────────
           --navy:      #071428  page background
           --dark:      #0d2040  panel / card background
           --mid:       #163460  inputs, inner cards
           --blue:      #2563eb  primary accent
           --sky:       #60a5fa  lighter accent / tab active
           --pale:      #bfdbfe  very light blue tint
           --white:     #ffffff
           --text:      #e8f4ff  primary text
           --muted:     #7aafd4  secondary / muted text
        ─────────────────────────────────────────────────────────── */

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #071428;
            color: #e8f4ff;
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            padding: 20px 30px;
            box-shadow: 0 4px 12px rgba(7, 20, 40, 0.6);
        }
        .header h1 { font-size: 28px; font-weight: 700; color: #fff; }

        /* ── Layout ── */
        .container { max-width: 1400px; margin: 0 auto; padding: 30px; }

        /* ── Control panel ── */
        .control-panel {
            background: #0d2040;
            border: 1px solid #163460;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(7,20,40,0.4);
        }
        .control-panel h2 { margin-bottom: 20px; color: #60a5fa; font-size: 20px; }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label {
            margin-bottom: 8px;
            font-weight: 500;
            color: #7aafd4;
            font-size: 14px;
        }
        .form-group input {
            padding: 12px 16px;
            background: #163460;
            border: 1.5px solid #1e4080;
            border-radius: 8px;
            color: #e8f4ff;
            font-size: 15px;
            transition: border-color 0.2s;
        }
        .form-group input::placeholder { color: #4a7aaa; }
        .form-group input:focus { outline: none; border-color: #60a5fa; }

        /* ── Buttons ── */
        .btn {
            padding: 13px 30px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
            box-shadow: 0 2px 8px rgba(37,99,235,0.35);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37,99,235,0.5);
        }
        .btn-danger {
            background: linear-gradient(135deg, #1e40af, #dc2626);
            color: #fff;
        }
        .btn-danger:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(220,38,38,0.4);
        }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }

        /* ── Status bar ── */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: #0d2040;
            border: 1px solid #163460;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #7aafd4;
        }
        .status-indicator {
            width: 11px; height: 11px;
            border-radius: 50%;
        }
        .status-indicator.idle    { background: #60a5fa; box-shadow: 0 0 6px #60a5fa88; }
        .status-indicator.running { background: #93c5fd; box-shadow: 0 0 6px #93c5fd88; animation: pulse 1s infinite; }
        .status-indicator.error   { background: #f87171; box-shadow: 0 0 6px #f8717188; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.4; }
        }

        /* ── Tabs ── */
        .tab-bar { display: flex; align-items: flex-end; gap: 4px; }

        .tab-btn {
            padding: 11px 26px;
            border: 1px solid #163460;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: #0a1c35;
            color: #4a7aaa;
            transition: all 0.2s;
            position: relative;
            bottom: -1px;
        }
        .tab-btn.active {
            background: #0d2040;
            color: #60a5fa;
            border-color: #163460;
            border-bottom-color: #0d2040;
        }
        .tab-btn:hover:not(.active) { color: #93c5fd; background: #0c1e38; }

        /* ── Main panel ── */
        .panel {
            background: #0d2040;
            border: 1px solid #163460;
            border-radius: 0 10px 10px 10px;
            padding: 22px;
            box-shadow: 0 4px 12px rgba(7,20,40,0.4);
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .panel-title { color: #60a5fa; font-size: 17px; font-weight: 600; }

        /* ── Log container ── */
        .log-container {
            height: calc(100vh - 370px);
            min-height: 350px;
            overflow-y: auto;
            background: #040f1f;
            border: 1px solid #0e2445;
            border-radius: 8px;
            padding: 14px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.65;
        }
        .log-entry {
            margin-bottom: 6px;
            padding: 7px 11px;
            border-radius: 5px;
            border-left: 3px solid;
        }
        .log-entry.info  { background: rgba(37,99,235,0.1);  border-left-color: #2563eb; }
        .log-entry.warn  { background: rgba(96,165,250,0.08); border-left-color: #60a5fa; }
        .log-entry.error { background: rgba(248,113,113,0.1); border-left-color: #f87171; }

        .log-entry .timestamp { color: #2e5c8a; font-size: 11px; margin-right: 6px; }
        .log-entry .level     { font-weight: 700; margin-right: 7px; }
        .log-entry.info  .level { color: #60a5fa; }
        .log-entry.warn  .level { color: #93c5fd; }
        .log-entry.error .level { color: #f87171; }
        .log-entry .message   { color: #c8e0f8; }

        /* ── Report viewer ── */
        .report-viewer {
            height: calc(100vh - 370px);
            min-height: 350px;
            overflow-y: auto;
            background: #040f1f;
            border: 1px solid #0e2445;
            border-radius: 8px;
            padding: 14px;
        }

        .report-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #0d2040;
            border: 1px solid #163460;
            padding: 18px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-card .number { font-size: 30px; font-weight: 700; margin-bottom: 4px; color: #fff; }
        .stat-card .label  { font-size: 13px; color: #7aafd4; }
        .stat-card.success .number { color: #60a5fa; }
        .stat-card.failed  .number { color: #f87171; }
        .stat-card.pending .number { color: #93c5fd; }

        /* ── Order items ── */
        .orders-list { margin-top: 16px; }
        .order-item {
            background: #0d2040;
            border: 1px solid #163460;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 9px;
            border-left: 4px solid;
        }
        .order-item.completed { border-left-color: #60a5fa; }
        .order-item.failed    { border-left-color: #f87171; }
        .order-item.running   { border-left-color: #93c5fd; }
        .order-item.pending   { border-left-color: #1e3a5f; }
        .order-item.stopped   { border-left-color: #3b82f6; }
        .order-item.timeout   { border-left-color: #bfdbfe; }
        .order-error { margin-top: 6px; font-size: 12px; color: #f87171; font-family: monospace; word-break: break-word; }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 7px;
        }
        .order-id      { font-weight: 600; color: #e8f4ff; }
        .order-details { font-size: 13px; color: #7aafd4; }

        .order-status {
            padding: 3px 11px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .order-status.completed { background: rgba(96,165,250,0.15);  color: #60a5fa; }
        .order-status.failed    { background: rgba(248,113,113,0.15); color: #f87171; }
        .order-status.running   { background: rgba(147,197,253,0.15); color: #93c5fd; }
        .order-status.stopped   { background: rgba(59,130,246,0.15);  color: #3b82f6; }
        .order-status.timeout   { background: rgba(191,219,254,0.1);  color: #bfdbfe; }
        .order-status.pending   { background: rgba(30,58,95,0.4);     color: #4a7aaa; }

        /* ── Clear button ── */
        .clear-logs-btn {
            padding: 7px 15px;
            background: #163460;
            color: #93c5fd;
            border: 1px solid #1e4080;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .clear-logs-btn:hover { background: #1e4080; }

        /* ── Spinner ── */
        .loading-overlay {
            position: fixed; inset: 0;
            background: rgba(4,15,31,0.85);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s;
        }
        .loading-overlay.active { opacity: 1; visibility: visible; }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid #163460;
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎭 ART Orchestrator Dashboard</h1>
    </div>
    
    <div class="container">
        <div class="control-panel">
            <h2>⚙️ Control Panel</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="merchantId">Merchant ID</label>
                    <input type="text" id="merchantId" placeholder="e.g., flipkart" value="flipkart">
                </div>
                <div class="form-group">
                    <label for="orderList">Order IDs (comma-separated)</label>
                    <input type="text" id="orderList" placeholder="e.g., ORD123,ORD456,ORD789">
                </div>
                <div class="form-group">
                    <label for="lastMinutes">Process Last N Minutes</label>
                    <input type="number" id="lastMinutes" placeholder="e.g., 60" min="1">
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <button class="btn btn-primary" id="startBtn" onclick="startART()">
                    ▶️ Start ART
                </button>
                <button class="btn btn-danger" id="stopBtn" onclick="stopART()" disabled>
                    ⏹️ Stop ART
                </button>
            </div>
        </div>
        
        <div class="status-bar">
            <div class="status-indicator idle" id="statusIndicator"></div>
            <span id="statusText">Idle - Ready to start</span>
        </div>
        
        <div class="tab-bar">
            <button class="tab-btn active" id="tab-logs" onclick="switchTab('logs')">📋 Live Logs</button>
            <button class="tab-btn" id="tab-report" onclick="switchTab('report')">📊 Execution Report</button>
        </div>

        <div class="panel">
            <div id="panel-logs">
                <div class="panel-header">
                    <span class="panel-title">📋 Live Logs</span>
                    <button class="clear-logs-btn" onclick="clearLogs()">Clear</button>
                </div>
                <div class="log-container" id="logContainer">
                    <div class="log-entry info">
                        <span class="timestamp">--:--:--</span>
                        <span class="level">[INFO]</span>
                        <span class="message">Dashboard initialized. Ready to start ART.</span>
                    </div>
                </div>
            </div>

            <div id="panel-report" style="display:none">
                <div class="panel-header">
                    <span class="panel-title">📊 Execution Report</span>
                </div>
                <div class="report-viewer" id="reportViewer">
                    <p style="text-align: center; color: #2e5c8a; margin-top: 100px;">
                        No report available yet.<br>
                        Start ART to see execution results.
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let eventSource = null;
        let isRunning = false;

        function switchTab(tab) {
            const logsPanel = document.getElementById('panel-logs');
            const reportPanel = document.getElementById('panel-report');
            const logsTab = document.getElementById('tab-logs');
            const reportTab = document.getElementById('tab-report');

            if (tab === 'logs') {
                logsPanel.style.display = 'block';
                reportPanel.style.display = 'none';
                logsTab.classList.add('active');
                reportTab.classList.remove('active');
            } else {
                logsPanel.style.display = 'none';
                reportPanel.style.display = 'block';
                reportTab.classList.add('active');
                logsTab.classList.remove('active');
            }
        }
        
        function updateStatus(status, text) {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            
            indicator.className = 'status-indicator ' + status;
            statusText.textContent = text;
            
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            
            if (status === 'running') {
                startBtn.disabled = true;
                stopBtn.disabled = false;
                isRunning = true;
            } else {
                startBtn.disabled = false;
                stopBtn.disabled = true;
                isRunning = false;
            }
        }
        
        function addLog(level, message, timestamp = new Date()) {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${level.toLowerCase()}`;
            
            const timeStr = timestamp.toLocaleTimeString();
            entry.innerHTML = `
                <span class="timestamp">${timeStr}</span>
                <span class="level">[${level.toUpperCase()}]</span>
                <span class="message">${message}</span>
            `;
            
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }
        
        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '';
        }
        
        async function startART() {
            const merchantId = document.getElementById('merchantId').value.trim();
            const orderList = document.getElementById('orderList').value.trim();
            const lastMinutes = document.getElementById('lastMinutes').value;

            if (!merchantId) {
                alert('Please enter a Merchant ID');
                return;
            }

            if (!orderList && !lastMinutes) {
                alert('Please enter Order IDs or specify Last Minutes');
                return;
            }

            updateStatus('running', 'Starting ART...');
            switchTab('logs');
            clearLogs();
            addLog('info', 'Starting ART process...');

            // Reset report viewer and clear the report file before starting
            resetReportViewer();
            await fetch('/api/reset-report', { method: 'POST' }).catch(() => {});

            try {
                const response = await fetch('/api/start-art', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        merchantId,
                        orderList: orderList ? orderList.split(',').map(s => s.trim()) : [],
                        lastMinutes: lastMinutes ? parseInt(lastMinutes) : null
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                addLog('info', `ART started: ${data.message}`);

                connectEventSource();

            } catch (error) {
                addLog('error', `Failed to start ART: ${error.message}`);
                updateStatus('idle', 'Failed to start');
            }
        }

        async function stopART() {
            try {
                const response = await fetch('/api/stop-art', { method: 'POST' });
                const data = await response.json();
                addLog('info', `ART stopped: ${data.message}`);
                // Keep SSE open — backend will send reportUpdate when report is written
                updateStatus('idle', 'Stopping...');
            } catch (error) {
                addLog('error', `Failed to stop ART: ${error.message}`);
            }
        }

        function resetReportViewer() {
            document.getElementById('reportViewer').innerHTML = `
                <p style="text-align: center; color: #2e5c8a; margin-top: 100px;">
                    ART is running...<br>
                    Report will appear here when complete.
                </p>
            `;
        }

        function connectEventSource() {
            if (eventSource) {
                eventSource.close();
            }

            eventSource = new EventSource('/api/stream-logs');

            eventSource.onopen = () => {
                addLog('info', 'Connected to log stream');
            };

            eventSource.onmessage = (event) => {
                const log = JSON.parse(event.data);
                addLog(log.level, log.message, new Date(log.timestamp));

                if (log.reportUpdate) {
                    loadReport();
                    switchTab('report');
                    // ART is fully done — close SSE and mark idle
                    if (eventSource) {
                        eventSource.close();
                        eventSource = null;
                    }
                    updateStatus('idle', 'Completed');
                }
            };

            eventSource.onerror = () => {
                addLog('warn', 'Log stream disconnected');
                if (isRunning) {
                    updateStatus('idle', 'Disconnected');
                }
            };
        }
        
        async function loadReport() {
            try {
                const response = await fetch('/api/report');
                if (!response.ok) return;
                
                const report = await response.json();
                renderReport(report);
                
            } catch (error) {
                console.error('Failed to load report:', error);
            }
        }
        
        function renderReport(report) {
            const container = document.getElementById('reportViewer');
            
            if (!report || !report.orders || report.orders.length === 0) {
                container.innerHTML = `
                    <p style="text-align: center; color: #2e5c8a; margin-top: 100px;">
                        No report available yet.<br>
                        Start ART to see execution results.
                    </p>
                `;
                return;
            }
            
            const summary = report.summary || {};
            const total = summary.totalOrders || 0;
            const completed = summary.completed || 0;
            const failed = summary.failed || 0;
            const stuck = summary.stuck || 0;
            const stopped = summary.stopped || 0;
            const timeout = summary.timeout || 0;
            const pending = total - completed - failed - stuck - stopped - timeout;
            
            let ordersHtml = '';
            for (const order of report.orders) {
                const status = order.status?.toLowerCase() || 'pending';
                const errorLine = order.errorMessage
                    ? `<div class="order-error">⚠ ${order.errorMessage}</div>`
                    : '';
                ordersHtml += `
                    <div class="order-item ${status}">
                        <div class="order-header">
                            <span class="order-id">${order.orderId}</span>
                            <span class="order-status ${status}">${order.status || 'PENDING'}</span>
                        </div>
                        <div class="order-details">
                            ${order.stopReason || 'Waiting...'}
                            ${order.logsProcessed ? `| Logs: ${order.logsProcessed}` : ''}
                            ${order.duration ? `| Duration: ${Math.round(order.duration/1000)}s` : ''}
                        </div>
                        ${errorLine}
                    </div>
                `;
            }
            
            container.innerHTML = `
                <div class="report-summary">
                    <div class="stat-card success">
                        <div class="number">${completed}</div>
                        <div class="label">Completed</div>
                    </div>
                    <div class="stat-card failed">
                        <div class="number">${failed}</div>
                        <div class="label">Failed</div>
                    </div>
                    <div class="stat-card pending">
                        <div class="number">${stuck}</div>
                        <div class="label">Stuck</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${pending}</div>
                        <div class="label">Pending</div>
                    </div>
                </div>
                <div class="orders-list">
                    ${ordersHtml}
                </div>
            `;
        }
        
    </script>
</body>
</html>
